# AI Sherpa GitHub label taxonomy — single source of truth.
#
# Derived files:
#   - .github/labels.yml             (consumed by EndBug/label-sync)
#   - .github/ISSUE_TEMPLATE/feedback.yml  (default labels block)
#   - Gate E auto-filer's label-assignment logic (post-2026-09 indicative)
#
# All three derived files are regenerated by tools/render-labels.{ps1,sh}.
# CI fails if any derived file is out of date with this source.
#
# See docs/superpowers/2026-05-30-program-v2.md §5.2.

version: 1

namespaces:

  source:
    description: |
      Which path produced the Issue. Lets triage filter and lets analytics
      attribute by channel.
    values:
      manual:
        color: "0e8a16"
        description: "Filed by a developer via /ai-sherpa-feedback or the GitHub Issue form."
      telemetry:
        color: "5319e7"
        description: "Auto-filed by the Gate E Scorer Registry. Carries a session_ref linking back to source traces."

  domain:
    description: |
      The domain the Issue is about. Matches the domain a developer's setup
      configured them for. Used for routing to domain leads and grouping
      release-notes.
    values:
      embedded:    { color: "c2e0c6", description: "Firmware / embedded systems / RTOS." }
      web:         { color: "c2e0c6", description: "Web frontend + backend full-stack." }
      data:        { color: "c2e0c6", description: "Data engineering / analytics / ML pipelines." }
      devops:      { color: "c2e0c6", description: "Infrastructure / CI/CD / observability." }
      marketing:   { color: "c2e0c6", description: "Marketing tools / content / campaigns." }
      sales:       { color: "c2e0c6", description: "Sales tools / CRM / deal workflows." }
      finance:     { color: "c2e0c6", description: "Finance / accounting / treasury tooling." }
      procurement: { color: "c2e0c6", description: "Procurement / vendor management." }
      service:     { color: "c2e0c6", description: "Customer service / support tooling." }
      core:        { color: "c2e0c6", description: "Cross-domain — applies to core/CLAUDE.md or setup, not a specific domain." }

  type:
    description: |
      Kind of change the Issue proposes. Drives the release-notes grouping
      via .github/release.yml categories.
    values:
      add-rule:      { color: "1d76db", description: "Add a new rule to a CLAUDE.md." }
      refine-rule:   { color: "1d76db", description: "Modify an existing rule." }
      update-skill:  { color: "1d76db", description: "Change a skill description, trigger phrasing, or skill set." }
      plugin:        { color: "1d76db", description: "Add or remove a plugin." }
      setup:         { color: "1d76db", description: "Change the setup script or installation flow." }
      docs:          { color: "1d76db", description: "Documentation-only change." }

  severity:
    description: |
      How bad is the underlying problem. Drives triage prioritization.
    values:
      low:    { color: "fbca04", description: "Cosmetic, nice-to-have, or low-impact." }
      medium: { color: "d93f0b", description: "Affects developer productivity or rule correctness in non-blocking ways." }
      high:   { color: "b60205", description: "Wrong answer, broken setup, or affects multiple developers." }

  confidence:
    description: |
      How confident the producer is in the Issue. Manual-source Issues default
      to high; telemetry-source Issues are gated on Scorer confidence per v2 §5.7.
    values:
      low:    { color: "ededed", description: "Single signal or untuned threshold." }
      medium: { color: "ededed", description: "Multiple signals, threshold within tuned range." }
      high:   { color: "ededed", description: "Strong evidence — ≥ 2 developers, fingerprint stable, evidence summary specific." }

  status:
    description: |
      Workflow state. ONLY the triage workflow may set status/*. Producers
      (slash command, auto-filer) MUST NOT include status/* in their initial labels.
    values:
      new:         { color: "ffffff", description: "Just filed. Awaiting first triage pass." }
      triage:      { color: "ffffff", description: "Under triage review (Friday meeting)." }
      approved:    { color: "0e8a16", description: "Triage approved; PR pending." }
      in-progress: { color: "fbca04", description: "PR open or being worked." }
      released:    { color: "5319e7", description: "Closed and shipped in a release. Tag in PR comment." }
      wont-fix:    { color: "cccccc", description: "Triage decided not to act. Closed with rationale." }

# Required-namespace contract:
# Every feedback Issue MUST have at least one label from each of:
#   source, domain, type, severity, confidence
# status/* is applied during workflow; it is not required at file time.
required_at_file_time: [source, domain, type, severity, confidence]
managed_by_workflow:   [status]
